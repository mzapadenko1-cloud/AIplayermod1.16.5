name: Build AI Player Mod
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '16'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '7.4'
      - run: gradle build --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: aiplayermod-jar
          path: build/libs/aiplayermod-*.jar
